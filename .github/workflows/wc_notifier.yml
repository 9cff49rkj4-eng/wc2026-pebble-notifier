name: WC2026 Live Notifier

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run notifier script
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python wc_notifier.py

      - name: Save state
        run: |
          git config user.name "wc-bot"
          git config user.email "wc-bot@users.noreply.github.com"
          git add match_state.json
          git diff --staged --quiet || git commit -m "Update match state $(date -u +%H:%M:%S)"
          git pull --rebase
          git commit --allow-empty -m "ping $(date -u +%H:%M:%S)"
          git push
          sleep 420
